name: kuyog
description: "Kuyog - Mindanao Tourism Companion App"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.0.0
  google_fonts: ^6.0.0
  cached_network_image: ^3.3.0
  shared_preferences: ^2.2.0
  provider: ^6.1.0
  fl_chart: ^0.69.0
  shimmer: ^3.0.0
  intl: ^0.19.0
  flutter_rating_bar: ^4.0.1
  percent_indicator: ^4.2.3
  qr_flutter: ^4.1.0
  smooth_page_indicator: ^1.2.0
  timeline_tile: ^2.0.0
  image_picker: ^1.1.0
  file_picker: ^8.1.2
  badges: ^3.1.2
  supabase_flutter: ^2.10.6
  flutter_dotenv: ^5.1.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - .env

dependency_overrides:
  path_provider_foundation: 2.3.2
